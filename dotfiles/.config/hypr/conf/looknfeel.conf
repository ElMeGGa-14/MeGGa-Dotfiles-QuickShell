$accent = rgba(5fd0b5ee)
$accent2 = rgba(f4a261ee)
$accent3 = rgba(9db4ffee)
$surface = rgba(171b20dd)
$surfaceSoft = rgba(222832cc)

general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = $accent $accent2 45deg
    col.inactive_border = rgba(2b3038aa)
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 8
    active_opacity = 1.0
    inactive_opacity = 0.95
    fullscreen_opacity = 1.0

    shadow {
        enabled = true
        range = 18
        render_power = 3
        color = rgba(00000055)
    }

    blur {
        enabled = true
        size = 6
        passes = 2
        vibrancy = 0.16
        special = true
    }
}

animations {
    enabled = true
    bezier = softOut, 0.16, 1, 0.3, 1
    bezier = softIn, 0.7, 0, 0.84, 0
    bezier = quick, 0.2, 0, 0, 1
    animation = windows, 1, 4, softOut, popin 92%
    animation = windowsOut, 1, 3, softIn, popin 92%
    animation = border, 1, 5, quick
    animation = fade, 1, 4, quick
    animation = layers, 1, 4, softOut
    animation = workspaces, 1, 4, softOut, slide
}

dwindle {
    preserve_split = true
}

master {
    new_status = master
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = true
}

cursor {
    hide_on_key_press = true
}
