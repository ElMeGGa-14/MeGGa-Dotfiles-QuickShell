input {
    kb_layout = us,latam
    kb_options = grp:alt_shift_toggle
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
        tap-to-click = true
        drag_lock = true
    }
}

# Hyprland 0.55 quitó algunas opciones antiguas de gestures.
# Si usas una versión con soporte explícito de swipe, agrégalo aquí.
